<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Sign in — Sufyan PostFire</title>
<link rel="stylesheet" href="style.css" />
</head>
<body>
<div class="auth-shell">
  <div class="auth-card">
    <div class="brand mb-16">
      <div class="brand-mark">SP</div>
      <div class="brand-name">Sufyan PostFire</div>
    </div>
    <h2>Welcome back</h2>
    <p class="sub">Sign in to manage your upload schedules.</p>
    <form id="loginForm">
      <div class="field">
        <label for="email">Email</label>
        <input id="email" type="email" required autocomplete="email" />
      </div>
      <div class="field">
        <label for="password">Password</label>
        <input id="password" type="password" required autocomplete="current-password" />
      </div>
      <div class="error-text" id="errorText"></div>
      <button class="btn primary block" type="submit">Sign in</button>
    </form>
    <div class="auth-switch">
      <a href="forgot-password.html">Forgot password?</a> &middot; Need an account? Contact us
    </div>
  </div>
</div>
<script src="app.js"></script>
<script src="login.js"></script>
</body>
</html>
