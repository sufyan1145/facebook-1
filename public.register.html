<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Create account — Drive2Facebook</title>
<link rel="stylesheet" href="style.css" />
</head>
<body>
<div class="auth-shell">
  <div class="auth-card">
    <div class="brand mb-16">
      <div class="brand-mark">D2</div>
      <div class="brand-name">Drive2Facebook</div>
    </div>
    <h2>Create your account</h2>
    <p class="sub">Automate video publishing from Drive to Facebook.</p>
    <form id="registerForm">
      <div class="field">
        <label for="name">Full name</label>
        <input id="name" type="text" required />
      </div>
      <div class="field">
        <label for="email">Email</label>
        <input id="email" type="email" required autocomplete="email" />
      </div>
      <div class="field">
        <label for="password">Password</label>
        <input id="password" type="password" required minlength="8" autocomplete="new-password" />
      </div>
      <div class="error-text" id="errorText"></div>
      <button class="btn primary block" type="submit">Create account</button>
    </form>
    <div class="auth-switch">Already have an account? <a href="login.html">Sign in</a></div>
  </div>
</div>
<script src="app.js"></script>
<script src="register.js"></script>
</body>
</html>
