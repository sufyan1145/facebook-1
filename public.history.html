<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Upload History — Drive2Facebook</title>
<link rel="stylesheet" href="style.css" />
</head>
<body>
<div class="app-shell">
  <aside class="sidebar">
    <div class="brand"><div class="brand-mark">D2</div><div class="brand-name">Drive2Facebook</div></div>
    <nav class="nav" id="nav"></nav>
    <button class="btn sm" id="signOutBtn" style="margin-top:auto;">Sign out</button>
  </aside>
  <div class="main">
    <div class="topbar"><h1>Upload History</h1></div>
    <div class="content">
      <div class="card">
        <div class="table-wrap">
          <table>
            <thead><tr><th>Video</th><th>Folder</th><th>Facebook Video ID</th><th>Status</th><th>Date</th></tr></thead>
            <tbody id="historyBody"><tr><td colspan="5" class="empty">Loading…</td></tr></tbody>
          </table>
        </div>
      </div>
    </div>
  </div>
</div>
<script src="app.js"></script>
<script src="history.js"></script>
</body>
</html>
