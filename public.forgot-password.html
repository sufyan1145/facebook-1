<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Reset password — Drive2Facebook</title>
<link rel="stylesheet" href="style.css" />
</head>
<body>
<div class="auth-shell">
  <div class="auth-card">
    <h2>Reset your password</h2>
    <p class="sub">We'll email you a link to set a new password.</p>
    <form id="forgotForm">
      <div class="field">
        <label for="email">Email</label>
        <input id="email" type="email" required />
      </div>
      <div class="error-text" id="errorText"></div>
      <button class="btn primary block" type="submit">Send reset link</button>
    </form>
    <div class="auth-switch"><a href="login.html">Back to sign in</a></div>
  </div>
</div>
<script src="app.js"></script>
<script>
document.getElementById('forgotForm').addEventListener('submit', async (e) => {
  e.preventDefault();
  const errorText = document.getElementById('errorText');
  errorText.textContent = '';
  try {
    await apiFetch('/auth/forgot-password', {
      method: 'POST',
      body: JSON.stringify({ email: document.getElementById('email').value }),
    });
    document.querySelector('.auth-card').innerHTML =
      '<h2>Check your inbox</h2><p class="sub">If that email is registered, a reset link is on its way.</p><a class="btn primary block mt-16" href="login.html">Back to sign in</a>';
  } catch (err) {
    errorText.textContent = err.message;
  }
});
</script>
</body>
</html>
