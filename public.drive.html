<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Drive Folders — Sufyan PostFire</title>
<link rel="stylesheet" href="style.css" />
</head>
<body>
<div class="app-shell">
  <aside class="sidebar">
    <div class="brand"><div class="brand-mark">SP</div><div class="brand-name">Sufyan PostFire</div></div>
    <nav class="nav" id="nav"></nav>
    <button class="btn sm" id="signOutBtn" style="margin-top:auto;">Sign out</button>
  </aside>
  <div class="main">
    <div class="topbar">
      <h1>Google Drive Folders</h1>
      <div class="status-pills">
        <button class="btn sm" id="connectBtn">Connect Drive</button>
        <button class="btn sm danger" id="disconnectBtn" style="display:none;">Disconnect</button>
      </div>
    </div>
    <div class="content">
      <div class="card mb-16">
        <div class="flex-between mb-16">
          <div class="section-title" style="margin-bottom:0;">Connected YouTube Channels</div>
          <button class="btn sm" id="connectYoutubeBtn">+ Add YouTube channel</button>
        </div>
        <div id="youtubeAccountsList" class="accounts-list"><span class="empty">Loading…</span></div>
      </div>
      <div class="card mb-16">
        <input id="searchInput" placeholder="Search folders by name…" style="width:100%; background:var(--panel-2); border:1px solid var(--border); border-radius:6px; padding:10px 12px; color:var(--text);" />
      </div>
      <div class="card">
        <div class="flex-between mb-16">
          <div class="section-title" style="margin-bottom:0;">Folders</div>
          <button class="btn sm" id="refreshBtn">Rescan Drive</button>
        </div>
        <div class="table-wrap">
          <table>
            <thead><tr><th>Folder Name</th><th>Folder ID</th><th>Videos</th><th>Storage</th><th>Owner</th><th>Last Modified</th></tr></thead>
            <tbody id="folderBody"><tr><td colspan="6" class="empty">Loading…</td></tr></tbody>
          </table>
        </div>
      </div>
    </div>
  </div>
</div>
<script src="app.js"></script>
<script src="drive.js"></script>
</body>
</html>
