<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Facebook Pages — Sufyan PostFire</title>
<link rel="stylesheet" href="style.css" />
</head>
<body>
<div class="app-shell">
  <aside class="sidebar">
    <div class="brand"><div class="brand-mark">SP</div><div class="brand-name">Sufyan PostFire</div></div>
    <nav class="nav" id="nav"></nav>
    <button class="btn sm" id="signOutBtn" style="margin-top:auto;">Sign out</button>
  </aside>
  <div class="main">
    <div class="topbar">
      <h1>Facebook Pages</h1>
      <div class="status-pills">
        <button class="btn sm" id="connectBtn">+ Add Facebook account</button>
        <button class="btn sm" id="syncBtn">Sync Pages</button>
      </div>
    </div>
    <div class="content">
      <div class="card" id="accountsCard" style="margin-bottom:16px;">
        <div id="accountsList" class="accounts-list"><span class="empty">Loading accounts…</span></div>
      </div>
      <div class="card">
        <div class="table-wrap">
          <table>
            <thead><tr><th>Page Name</th><th>Facebook Account</th><th>Page ID</th><th>Followers</th><th>Status</th><th></th></tr></thead>
            <tbody id="pagesBody"><tr><td colspan="6" class="empty">Loading…</td></tr></tbody>
          </table>
        </div>
      </div>
    </div>
  </div>
</div>
<script src="app.js"></script>
<script src="pages.js"></script>
</body>
</html>
