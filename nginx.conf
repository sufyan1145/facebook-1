# Drive2Facebook Automation - Nginx reverse proxy config
# Place at /etc/nginx/sites-available/drive2facebook.conf (or use with docker-compose)

server {
    listen 80;
    server_name your-domain.com;

    # Redirect HTTP -> HTTPS (uncomment once SSL is configured)
    # return 301 https://$host$request_uri;

    client_max_body_size 500M;   # allow large video uploads through the proxy
    proxy_read_timeout 600s;
    proxy_send_timeout 600s;

    location / {
        proxy_pass http://app:5000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }
}

